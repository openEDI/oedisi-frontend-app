name: Smoke Templates

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke-templates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start backend server
        run: |
          npm run dev:server > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for backend readiness
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3001/api/templates >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not start in time"
          cat server.log || true
          exit 1

      - name: Run template smoke test
        run: npm run smoke:templates

      - name: Stop backend server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi

      - name: Print backend logs on failure
        if: failure()
        run: cat server.log || true
