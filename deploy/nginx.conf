# nginx site config for oedisi-frontend-app with TLS + per-user HTTP Basic auth.
#
# Setup:
#   1. Build the frontend so it calls the API same-origin (relative /api):
#          VITE_API_URL=/api npm run build
#   2. Create credentials (one entry per user):
#          htpasswd -c /etc/nginx/oedisi.htpasswd alice   # -c creates the file
#          htpasswd    /etc/nginx/oedisi.htpasswd bob      # omit -c to append
#   3. Run main server bound to localhost only (already the default in main.py),
#      with multi-user mode on so it trusts the X-Remote-User header below:
#          OEDISI_COMPONENTS=/path OEDISI_MULTI_USER=1 uv run uvicorn main:app --host 127.0.0.1 --port 3001
#   4. Point ssl_certificate/ssl_certificate_key at the real cert paths, then:
#          nginx -t && systemctl reload nginx
#
# Security invariants (do not weaken):
#   * The backend listens on 127.0.0.1 only, so nginx is the gatekeeper.
#   * Basic auth credentials are only safe over TLS.
#   * proxy_set_header below OVERWRITES any X-Remote-User the client sent.

server {
    listen 80;
    server_name oedi.ornl.gov;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name oedi.ornl.gov;

    # Standard .pem (cert + chain) / .key (private key) pair on the VM.
    ssl_certificate     /etc/ssl/oedi.ornl.gov/fullchain.pem;
    ssl_certificate_key /etc/ssl/oedi.ornl.gov/privkey.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Built frontend assets (npm run build -> dist/).
    root /srv/oedisi-frontend-app/dist;
    index index.html;

    # HTTP Basic authentication
    auth_basic           "OEDISI";
    auth_basic_user_file /etc/nginx/oedisi.htpasswd;

    # SPA history-mode fallback: unknown paths render index.html, Vue Router
    # takes over client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;

        # Hand the authenticated identity to the backend. $remote_user is the
        # username nginx extracted from the Basic credentials.
        proxy_set_header X-Remote-User $remote_user;

        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
